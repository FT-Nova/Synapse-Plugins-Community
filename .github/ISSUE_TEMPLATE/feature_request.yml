name: Feature Request
description: Suggest an idea or enhancement for a community plugin
title: "[FEATURE] "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We value your ideas to improve community plugins.

  - type: dropdown
    id: request-type
    attributes:
      label: Request Type
      description: What type of feature request is this?
      options:
        - New feature for existing plugin
        - Enhancement to existing plugin
        - New plugin idea
        - Infrastructure/tooling improvement
    validations:
      required: true

  - type: input
    id: plugin-name
    attributes:
      label: Plugin Name
      description: Which plugin would this feature be for? (Leave blank if this is a new plugin idea)
      placeholder: e.g., my-awesome-plugin

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I also thought about...

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: Who would benefit from this feature and how?
      placeholder: This would help users by...
    validations:
      required: true

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: Provide specific use cases or scenarios where this feature would be useful
      placeholder: |
        1. When a user wants to...
        2. In scenarios where...
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical - Blocking my use case
        - High - Significantly impacts usability
        - Medium - Would be nice to have
        - Low - Minor improvement
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      description: How complex do you think this feature would be to implement?
      options:
        - Small - Minor change
        - Medium - Moderate effort
        - Large - Significant development
        - Unknown

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature request here
      placeholder: Any other information that might be helpful

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      description: Would you be willing to contribute?
      options:
        - label: I would be willing to implement this feature myself
        - label: I would be willing to help test this feature
        - label: I can provide design/UX guidance

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this hasn't been requested before
          required: true
        - label: This feature aligns with the goals of the Synapse ecosystem
          required: true
